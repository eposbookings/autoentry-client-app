name: Sync code to 20i VPS

on:
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Git branch to sync to the VPS"
        required: true
        default: "main"

concurrency:
  group: sync-vps-code
  cancel-in-progress: false

jobs:
  sync:
    name: Pull latest code only
    runs-on: ubuntu-latest

    steps:
      - name: Sync code over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            cd /opt/autoentry-client-app

            DEPLOY_BRANCH="${{ inputs.deploy_branch }}"

            echo "Syncing branch: $DEPLOY_BRANCH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            echo "VPS is now on:"
            git log --oneline -1
            git status --short
