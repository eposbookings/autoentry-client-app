name: Sync code to 20i VPS

on:
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Git branch to sync to the VPS"
        required: true
        default: "main"
      react_app_backend_url:
        description: "Public backend origin compiled into the React app"
        required: true
        default: "https://eposbookings.net"
      rebuild_backend:
        description: "Rebuild and restart the API container after syncing code"
        required: true
        type: boolean
        default: true

concurrency:
  group: sync-vps-code
  cancel-in-progress: false

jobs:
  build-frontend:
    name: Build frontend on GitHub
    runs-on: ubuntu-latest

    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_branch }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ inputs.react_app_backend_url }}
        run: pnpm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          if-no-files-found: error

  build-api:
    name: Build API image on GitHub
    runs-on: ubuntu-latest

    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_branch }}

      - name: Build API Docker image
        run: docker build -t autoentry-client-app-api:latest ./backend

      - name: Save API Docker image
        run: docker save autoentry-client-app-api:latest | gzip > api-image.tar.gz

      - name: Upload API image artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: api-image.tar.gz
          if-no-files-found: error

  deploy:
    name: Sync code and deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - build-api

    steps:
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - name: Download API image artifact
        uses: actions/download-artifact@v4
        with:
          name: api-image
          path: api-image

      - name: Copy frontend build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "frontend-build/*"
          target: "/tmp/autoentry-client-app"
          rm: true
          strip_components: 1

      - name: Copy API image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "api-image/api-image.tar.gz"
          target: "/tmp/autoentry-client-app-api"
          rm: true
          strip_components: 1

      - name: Sync code and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd /opt/autoentry-client-app

            DEPLOY_BRANCH="${{ inputs.deploy_branch }}"

            echo "Syncing branch: $DEPLOY_BRANCH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            echo "Installing prebuilt frontend files"
            rm -rf frontend/build
            mkdir -p frontend/build
            cp -a /tmp/autoentry-client-app/. frontend/build/

            echo "VPS is now on:"
            git log --oneline -1
            git status --short

            if [ "${{ inputs.rebuild_backend }}" = "true" ]; then
              echo "Loading prebuilt API image"
              gzip -dc /tmp/autoentry-client-app-api/api-image.tar.gz | docker load
              docker compose up -d --no-build api
            fi

            echo "Restarting lightweight web containers"
            docker compose up -d --force-recreate frontend nginx

            echo "Health check"
            for attempt in $(seq 1 30); do
              if curl -fsS http://localhost:8000/api/health; then
                echo
                echo "API is healthy"
                exit 0
              fi
              echo "API not ready yet ($attempt/30); waiting..."
              sleep 3
            done

            echo "API did not become healthy. Recent logs:"
            docker compose logs --tail=120 api
            exit 1
