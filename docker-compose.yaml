
services:
  mysql:
    image: mysql:8.4
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-autoentry_portal}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
  nginx:
    restart: always
    build:
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend
    links:
      - "api:api"
      - "frontend:frontend"
    volumes:
      - /var/www/.well-known/pki-validation:/var/www/.well-known/pki-validation
  api:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        JWT_SECRET: ${JWT_SECRET}
        FERNET_KEY: ${FERNET_KEY}
        APP_PORT: ${APP_PORT}
    env_file:
      - ./.env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).read()\""]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s
    volumes:
      - ./backend/uploads:/app/uploads
  frontend:
    restart: always
    image: nginx:stable-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
